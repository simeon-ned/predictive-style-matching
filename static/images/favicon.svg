<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Humanoid robot">
  <rect width="32" height="32" rx="6" fill="#4c72b0"/>
  <!-- head -->
  <rect x="12" y="4" width="8" height="6" rx="1.5" fill="#ffffff"/>
  <!-- antenna -->
  <rect x="15.25" y="2" width="1.5" height="2.5" rx="0.75" fill="#55a868"/>
  <circle cx="16" cy="1.5" r="1.2" fill="#55a868"/>
  <!-- eyes -->
  <rect x="13.5" y="6" width="2" height="2" rx="0.5" fill="#4c72b0"/>
  <rect x="16.5" y="6" width="2" height="2" rx="0.5" fill="#4c72b0"/>
  <!-- torso -->
  <rect x="10" y="11" width="12" height="9" rx="2" fill="#ffffff"/>
  <!-- arms -->
  <rect x="5" y="12" width="4" height="7" rx="1.5" fill="#eaf5ec" stroke="#55a868" stroke-width="1"/>
  <rect x="23" y="12" width="4" height="7" rx="1.5" fill="#eaf5ec" stroke="#55a868" stroke-width="1"/>
  <!-- legs -->
  <rect x="11" y="21" width="4" height="8" rx="1.5" fill="#ffffff"/>
  <rect x="17" y="21" width="4" height="8" rx="1.5" fill="#ffffff"/>
  <!-- feet -->
  <rect x="9.5" y="28.5" width="6" height="2" rx="1" fill="#55a868"/>
  <rect x="16.5" y="28.5" width="6" height="2" rx="1" fill="#55a868"/>
</svg>
